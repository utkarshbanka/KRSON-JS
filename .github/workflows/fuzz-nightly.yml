name: Nightly Fuzz

on:
  schedule:
    # 03:00 UTC daily
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      iterations:
        description: 'Iterations per fuzz category'
        required: false
        default: '200000'

jobs:
  fuzz:
    name: Deep fuzz run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run deep fuzz pass
        run: node fuzz.js --iterations=${{ github.event.inputs.iterations || '200000' }}